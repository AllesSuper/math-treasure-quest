name: Deploy to GitHub Pages

# Publishes the static app (repository root) to GitHub Pages on every push to
# main, and allows manual runs from the Actions tab.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the whole repository root (the app is a static site).
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
