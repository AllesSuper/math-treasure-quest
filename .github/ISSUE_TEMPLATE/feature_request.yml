name: "\U0001F4A1 Feature request"
description: "Suggest an idea or improvement for Mathe-Schatzreise."
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! ✨
        Great features for kids' learning often start as a simple suggestion.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the need or the situation that inspired this idea.
      placeholder: "Children lose motivation because there is no way to celebrate a perfect run."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay
        - Accessibility
        - Translations / i18n
        - Visual design
        - Parent / teacher tools
        - Other
    validations:
      required: true
  - type: checkboxes
    id: principles
    attributes:
      label: Project principles
      options:
        - label: This idea keeps the app offline-first, ad-free, and privacy-friendly.
          required: true
