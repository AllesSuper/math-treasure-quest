<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Mathe-Schatzreise">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b3b8f"/>
      <stop offset="1" stop-color="#0e1b3a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe07a"/>
      <stop offset="1" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="chest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b5651d"/>
      <stop offset="1" stop-color="#7a3e10"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <circle cx="256" cy="196" r="120" fill="url(#gold)" opacity="0.18"/>
  <!-- Treasure chest body -->
  <rect x="136" y="250" width="240" height="150" rx="22" fill="url(#chest)"/>
  <rect x="136" y="214" width="240" height="70" rx="30" fill="#8a4513"/>
  <rect x="136" y="300" width="240" height="26" fill="#5e2f0c"/>
  <rect x="236" y="284" width="40" height="56" rx="8" fill="url(#gold)"/>
  <circle cx="256" cy="312" r="12" fill="#7a3e10"/>
  <!-- Math symbols sparkling above the chest -->
  <text x="176" y="170" font-family="Arial, sans-serif" font-size="86" font-weight="700" fill="url(#gold)">+</text>
  <text x="300" y="150" font-family="Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff">×</text>
  <text x="248" y="205" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="#7ee0c0">−</text>
  <!-- Sparkles -->
  <circle cx="150" cy="120" r="8" fill="#ffffff"/>
  <circle cx="372" cy="210" r="6" fill="#ffffff"/>
  <circle cx="110" cy="260" r="5" fill="#ffe07a"/>
</svg>
